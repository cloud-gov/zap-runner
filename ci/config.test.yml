---
# Overlay for initial development/testing only.
# Use with: fly set-pipeline ... -l ci/config.yml -l ci/config.test.yml

s3_prefix: zap-test

defectdojo_enabled: "true"
defectdojo_url: https://defectdojo.fr-stage.cloud.gov/
defectdojo_verify_ssl: "true"

# Keep report-only during initial test.
zap_enforce_failure: "false"

# Optional tighter scan defaults for quicker iteration.
zap_minutes: "5"
zap_max_depth: "3"
zap_thread_count: "1"
zap_passive_wait_minutes: "3"
zap_fail_warn_level: "High"
zap_fail_error_level: "High"
