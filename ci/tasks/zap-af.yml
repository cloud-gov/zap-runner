# ci/tasks/zap-af.yml
platform: linux
image_resource:
  type: registry-image
  source:
    aws_access_key_id: ((ecr_aws_key))
    aws_region: us-gov-west-1
    aws_secret_access_key: ((ecr_aws_secret))
    repository: ((repo_name)) # built FROM ${base_image}
    tag: ((runner_tag))

inputs:
  - name: zap-runner

outputs:
  - name: zap-reports

params:
  SCAN_CONTEXT:
  AUTH_TOKEN_FILE:

run:
  path: bash
  args:
    - -euo
    - pipefail
    - zap-runner/ci/tools/run-zap-af.sh
