platform: linux

image_resource:
  type: registry-image
  source:
    aws_access_key_id: ((ecr_aws_key))
    aws_secret_access_key: ((ecr_aws_secret))
    repository: ((repo_name))
    aws_region: ((aws_region))
    tag: ((runner_tag))

inputs:
  - name: zap-runner

outputs:
  - name: zap-report
    path: /tmp/zap-report
  - name: scan-state
    path: /tmp/scan-state

params:
  TARGET_CONTEXT:
  TARGETS_FILE: "ci/zap-config/targets.yml"
  AUTH_PROFILES_JSON:
  ZAP_ENFORCE_FAILURE: "false"
  ZAP_MINUTES: "20"
  ZAP_MAX_DEPTH: "5"
  ZAP_THREAD_COUNT: "2"
  ZAP_PASSIVE_WAIT_MINUTES: "10"
  ZAP_FAIL_WARN_LEVEL: "Medium"
  ZAP_FAIL_ERROR_LEVEL: "High"

run:
  path: bash
  args:
    - -ceu
    - |
      set -o pipefail
      shopt -s inherit_errexit

      repo_dir="zap-runner"
      targets_yml="${repo_dir}/${TARGETS_FILE}"
      work_root="/tmp/zap-report/${TARGET_CONTEXT}"
      state_root="/tmp/scan-state/${TARGET_CONTEXT}"

      mkdir -p "${work_root}" "${state_root}"

      echo "Starting ZAP automation scans for context '${TARGET_CONTEXT}' using ${TARGETS_FILE}"

      if [[ ! -f "${targets_yml}" ]]; then
        echo "Missing target inventory: ${targets_yml}" >&2
        exit 1
      fi

      if ! jq -e . >/dev/null 2>&1 <<<"${AUTH_PROFILES_JSON}"; then
        echo "AUTH_PROFILES_JSON is not valid JSON" >&2
        exit 1
      fi

      declare -A TOKEN_CACHE=()
      overall_failure="false"
      scanned_any="false"

      get_profile_field() {
        local profile="$1"
        local field="$2"
        jq -r --arg profile "${profile}" --arg field "${field}" \
          '.[$profile][$field] // empty' <<<"${AUTH_PROFILES_JSON}"
      }

      fetch_cf_bearer_token() {
        local profile="$1"
        local cf_api username password cf_home raw_token

        if [[ -n "${TOKEN_CACHE[$profile]:-}" ]]; then
          printf '%s' "${TOKEN_CACHE[$profile]}"
          return 0
        fi

        cf_api="$(get_profile_field "${profile}" "cf_api")"
        username="$(get_profile_field "${profile}" "username")"
        password="$(get_profile_field "${profile}" "password")"

        if [[ -z "${cf_api}" || -z "${username}" || -z "${password}" ]]; then
          echo "Missing auth profile inputs for profile '${profile}'" >&2
          return 1
        fi

        cf_home="$(mktemp -d)"
        CF_HOME="${cf_home}" cf api "${cf_api}" >/dev/null
        CF_HOME="${cf_home}" cf auth "${username}" "${password}" >/dev/null
        raw_token="$(CF_HOME="${cf_home}" cf oauth-token | tr -d '\r')"
        rm -rf "${cf_home}"

        raw_token="${raw_token#bearer }"
        raw_token="${raw_token#Bearer }"

        if [[ -z "${raw_token}" ]]; then
          echo "cf oauth-token returned an empty token for profile '${profile}'" >&2
          return 1
        fi

        TOKEN_CACHE["${profile}"]="${raw_token}"
        printf '%s' "${TOKEN_CACHE[$profile]}"
      }

      python3 - <<'PY' "${targets_yml}" "${TARGET_CONTEXT}" > "${state_root}/targets.jsonl"
import copy
import json
import sys
import yaml

path = sys.argv[1]
wanted_context = sys.argv[2]

with open(path, "r", encoding="utf-8") as f:
    data = yaml.safe_load(f) or {}

global_defaults = data.get("defaults", {})
services = data.get("services", [])

def deep_merge(base, override):
    if isinstance(base, dict) and isinstance(override, dict):
        merged = copy.deepcopy(base)
        for key, value in override.items():
            if key in merged:
                merged[key] = deep_merge(merged[key], value)
            else:
                merged[key] = copy.deepcopy(value)
        return merged
    return copy.deepcopy(override)

for service in services:
    service_meta = {k: v for k, v in service.items() if k != "targets"}
    service_defaults = deep_merge(global_defaults, service_meta)

    for raw_target in service.get("targets", []):
        target = deep_merge(service_defaults, raw_target)
        if not target.get("enabled", True):
            continue
        if target.get("context") != wanted_context:
            continue
        print(json.dumps(target, separators=(",", ":")))
PY

      if [[ ! -s "${state_root}/targets.jsonl" ]]; then
        echo "No enabled targets found for context '${TARGET_CONTEXT}'"
        exit 0
      fi

      build_plan() {
        local target_json="$1"
        local plan_path="$2"
        local report_dir="$3"

        TARGET_JSON="${target_json}" \
        PLAN_PATH="${plan_path}" \
        REPORT_DIR="${report_dir}" \
        ZAP_MINUTES="${ZAP_MINUTES}" \
        ZAP_MAX_DEPTH="${ZAP_MAX_DEPTH}" \
        ZAP_THREAD_COUNT="${ZAP_THREAD_COUNT}" \
        ZAP_PASSIVE_WAIT_MINUTES="${ZAP_PASSIVE_WAIT_MINUTES}" \
        ZAP_FAIL_WARN_LEVEL="${ZAP_FAIL_WARN_LEVEL}" \
        ZAP_FAIL_ERROR_LEVEL="${ZAP_FAIL_ERROR_LEVEL}" \
        python3 - <<'PY'
import json
import os
import yaml

target = json.loads(os.environ["TARGET_JSON"])
plan_path = os.environ["PLAN_PATH"]
report_dir = os.environ["REPORT_DIR"]

name = target["name"]
url = target["url"]
include_paths = target.get("include_paths") or [f"^{url.rstrip('/')}/.*"]
exclude_paths = target.get("exclude_paths") or []
auth_mode = target.get("auth_mode", "unauthenticated")
bearer_token = target.get("_runtime_bearer_token", "")

jobs = []

if auth_mode == "bearer":
    jobs.append({
        "type": "replacer",
        "parameters": {
            "deleteAllRules": True
        },
        "rules": [
            {
                "description": "Authorization header",
                "enabled": True,
                "matchType": "REQ_HEADER",
                "matchRegex": False,
                "matchString": "Authorization",
                "replacement": f"Bearer {bearer_token}",
                "initiators": [],
                "url": ""
            }
        ]
    })

jobs.extend([
    {
        "type": "spider",
        "parameters": {
            "context": name,
            "user": "",
            "maxDepth": int(os.environ["ZAP_MAX_DEPTH"]),
            "threadCount": int(os.environ["ZAP_THREAD_COUNT"]),
            "url": url
        }
    },
    {
        "type": "passiveScan-config",
        "parameters": {
            "maxAlertsPerRule": 10,
            "scanOnlyInScope": True
        }
    },
    {
        "type": "passiveScan-wait",
        "parameters": {
            "maxDuration": int(os.environ["ZAP_PASSIVE_WAIT_MINUTES"])
        }
    },
    {
        "type": "activeScan",
        "parameters": {
            "context": name,
            "user": "",
            "policy": "Default Policy",
            "maxRuleDurationInMins": 0,
            "maxScanDurationInMins": int(os.environ["ZAP_MINUTES"]),
            "addQueryParam": False,
            "inScopeOnly": True
        }
    },
    {
        "type": "report",
        "parameters": {
            "template": "traditional-html",
            "reportDir": report_dir,
            "reportFile": f"{name}.html",
            "displayReport": False
        }
    },
    {
        "type": "report",
        "parameters": {
            "template": "traditional-json",
            "reportDir": report_dir,
            "reportFile": f"{name}.json",
            "displayReport": False
        }
    },
    {
        "type": "report",
        "parameters": {
            "template": "traditional-xml",
            "reportDir": report_dir,
            "reportFile": f"{name}.xml",
            "displayReport": False
        }
    },
    {
        "type": "report",
        "parameters": {
            "template": "sarif-json",
            "reportDir": report_dir,
            "reportFile": f"{name}.sarif.json",
            "displayReport": False
        }
    },
    {
        "type": "exitStatus",
        "parameters": {
            "warnLevel": os.environ["ZAP_FAIL_WARN_LEVEL"],
            "errorLevel": os.environ["ZAP_FAIL_ERROR_LEVEL"]
        }
    }
])

plan = {
    "env": {
        "contexts": [
            {
                "name": name,
                "urls": [url],
                "includePaths": include_paths,
                "excludePaths": exclude_paths,
            }
        ]
    },
    "jobs": jobs
}

with open(plan_path, "w", encoding="utf-8") as f:
    yaml.safe_dump(plan, f, sort_keys=False)
PY

        chmod 600 "${plan_path}"
      }

      while IFS= read -r target_json; do
        scanned_any="true"

        name="$(jq -r '.name' <<<"${target_json}")"
        url="$(jq -r '.url' <<<"${target_json}")"
        auth_mode="$(jq -r '.auth_mode // "unauthenticated"' <<<"${target_json}")"
        auth_profile="$(jq -r '.auth_profile // ""' <<<"${target_json}")"

        target_dir="${work_root}/${name}"
        mkdir -p "${target_dir}"

        plan_file="${target_dir}/automation-plan.yaml"
        metadata_file="${target_dir}/scan-metadata.json"

        runtime_target_json="${target_json}"

        if [[ "${auth_mode}" == "bearer" ]]; then
          if [[ -z "${auth_profile}" ]]; then
            echo "Target '${name}' requires bearer auth but auth_profile is empty" >&2
            exit 1
          fi
          bearer_token="$(fetch_cf_bearer_token "${auth_profile}")"
          runtime_target_json="$(jq --arg token "${bearer_token}" '. + {"_runtime_bearer_token": $token}' <<<"${runtime_target_json}")"
        fi

        echo "Building plan for ${name} (${url})"
        build_plan "${runtime_target_json}" "${plan_file}" "${target_dir}"

        jq \
          --arg started_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          '{
            name,
            service_name,
            context,
            url,
            auth_mode,
            auth_profile,
            include_paths,
            exclude_paths,
            scan,
            report_to_defectdojo,
            defectdojo,
            legacy,
            started_at_utc: $started_at
          }' <<<"${target_json}" > "${metadata_file}"

        set +e
        /zap/zap.sh -cmd -silent -autorun "${plan_file}"
        zap_exit_code=$?
        set -e

        jq \
          --arg finished_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          --argjson exit_code "${zap_exit_code}" \
          '. + {
            finished_at_utc: $finished_at,
            zap_exit_code: $exit_code,
            html_report: (.name + ".html"),
            json_report: (.name + ".json"),
            xml_report: (.name + ".xml"),
            sarif_report: (.name + ".sarif.json")
          }' "${metadata_file}" > "${metadata_file}.tmp"
        mv "${metadata_file}.tmp" "${metadata_file}"

        rm -f "${plan_file}"

        if [[ "${zap_exit_code}" -ne 0 ]]; then
          echo "ZAP returned exit code ${zap_exit_code} for ${name}"
          if [[ "${ZAP_ENFORCE_FAILURE}" == "true" ]]; then
            overall_failure="true"
          fi
        fi

        echo "Finished ${name}"
      done < "${state_root}/targets.jsonl"

      python3 - <<'PY' "${work_root}" "${state_root}/context-summary.json" "${TARGET_CONTEXT}"
import json
import os
import sys

work_root = sys.argv[1]
summary_path = sys.argv[2]
context = sys.argv[3]

targets = []
for entry in sorted(os.listdir(work_root)):
    metadata_path = os.path.join(work_root, entry, "scan-metadata.json")
    if os.path.isfile(metadata_path):
        with open(metadata_path, "r", encoding="utf-8") as f:
            targets.append(json.load(f))

with open(summary_path, "w", encoding="utf-8") as f:
    json.dump({"context": context, "targets": targets}, f, indent=2)
PY

      if [[ "${scanned_any}" != "true" ]]; then
        echo "No enabled targets found for context '${TARGET_CONTEXT}'"
        exit 0
      fi

      if [[ "${overall_failure}" == "true" ]]; then
        echo "One or more scans returned non-zero and ZAP_ENFORCE_FAILURE=true" >&2
        exit 1
      fi

      echo "Completed context '${TARGET_CONTEXT}'"