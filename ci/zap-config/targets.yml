---
defaults:
  enabled: true
  auth_mode: bearer
  report_to_defectdojo: true
  exclude_paths:
    - "mozilla\\.com"
    - "mozilla\\.net"
    - "mozilla\\.org"
    - "firefox\\.com"
    - "getpocket\\.com"
    - "cloudflare-dns\\.com"
    - "digitalgov\\.gov"
    - "elastic\\.co"
    - "grafana\\.com"
    - "jsdelivr\\.net"
    - "secureauth\\.gsa\\.gov"
    - ".*logout.*"
    - ".*signout.*"
  scan:
    minutes: 20
    max_depth: 5
    thread_count: 2
    passive_wait_minutes: 10
    fail_warn_level: Medium
    fail_error_level: High
  defectdojo:
    product_type_name: "Web Application"
    tags:
      - zap
      - concourse
      - automated

services:
  - service_name: billing-api-development
    context: development
    defectdojo:
      product_name: "billing-api"
      engagement_name: "Recurring ZAP - Development"
    targets:
      - name: billing-api-development
        url: https://billing.dev.us-gov-west-1.aws-us-gov.cloud.gov
        auth_profile: development
        include_paths:
          - "^https://billing\\.dev\\.us-gov-west-1\\.aws-us-gov\\.cloud\\.gov/.*"
        defectdojo:
          test_title: "billing.dev.us-gov-west-1.aws-us-gov.cloud.gov"
        legacy:
          source_file: "cloud.gov billing api development.context"
          legacy_context_name: "cloud.gov billing api"
          legacy_inscope: true

  - service_name: billing-api
    context: external
    defectdojo:
      product_name: "billing-api"
    targets:
      - name: billing-api-staging
        url: https://billing.fr-stage.cloud.gov
        auth_profile: staging
        include_paths:
          - "^https://billing\\.fr-stage\\.cloud\\.gov/.*"
        defectdojo:
          engagement_name: "Recurring ZAP - Staging"
          test_title: "billing.fr-stage.cloud.gov"
        legacy:
          source_file: "cloud.gov billing api staging.context"
          legacy_context_name: "cloud.gov billing api"
          legacy_inscope: true

      - name: billing-api-production
        url: https://billing.fr.cloud.gov
        auth_profile: production
