---
# Cloud-Gov ZAP Scan Targets
#
# Contexts: internal, external, pages, development
# Scan types: web (default, full spider) | api (shallow, depth 1)
#
# Scan Profiles (centrally managed in defaults.scan_profiles):
#   full       — 20min, depth 5, 2 threads (default for web apps)
#   api        — 10min, depth 2, 1 thread  (REST APIs, scan_type: api)
#   dashboard  — 10min, depth 3, 2 threads (admin UIs, dashboards)
#   monitoring — 3min,  depth 2, 1 thread  (passive-only, read-only UIs)
#   identity   — 10min, depth 3, 1 thread  (auth/login pages, careful)
#   light      — 5min,  depth 2, 1 thread  (static/public sites)
#
# Usage: set scan_profile on each target. No inline scan settings needed.
# To override a single setting, add it under scan: (deep merge with profile).

defaults:
  enabled: true
  scan_variant: unauthenticated
  auth_mode: bearer
  report_to_defectdojo: true
  exclude_paths:
  - mozilla\.com
  - mozilla\.net
  - mozilla\.org
  - firefox\.com
  - getpocket\.com
  - cloudflare-dns\.com
  - digitalgov\.gov
  - elastic\.co
  - grafana\.com
  - jsdelivr\.net
  - secureauth\.gsa\.gov
  - .*logout.*
  - .*signout.*
  scan: &id001
    minutes: 20
    max_depth: 5
    thread_count: 2
    passive_wait_minutes: 10
    fail_warn_level: Medium
    fail_error_level: High
  defectdojo:
    product_type_name: Web Application
    tags:
    - zap
    - concourse
    - automated
  scan_profiles:
    full: *id001
    api:
      minutes: 10
      max_depth: 2
      thread_count: 1
      passive_wait_minutes: 5
      fail_warn_level: Medium
      fail_error_level: High
    dashboard:
      minutes: 10
      max_depth: 3
      thread_count: 2
      passive_wait_minutes: 5
      fail_warn_level: Medium
      fail_error_level: High
    monitoring:
      minutes: 3
      max_depth: 2
      thread_count: 1
      passive_wait_minutes: 2
      passive_only: true
      fail_warn_level: Medium
      fail_error_level: High
    identity:
      minutes: 10
      max_depth: 3
      thread_count: 1
      passive_wait_minutes: 5
      fail_warn_level: Medium
      fail_error_level: High
    light:
      minutes: 5
      max_depth: 2
      thread_count: 1
      passive_wait_minutes: 3
      fail_warn_level: Medium
      fail_error_level: High
services:
- service_name: cloud-gov-public
  context: external
  scan_variant: unauthenticated
  auth_mode: unauthenticated
  defectdojo:
    product_name: cloud.gov Public
  targets:
  - name: cloud-gov-public
    url: https://cloud.gov
    include_paths:
    - ^https://cloud\.gov/.*
    defectdojo:
      engagement_name: Recurring ZAP - cloud.gov Public
      test_title: cloud.gov (unauthenticated)
    scan_profile: light
- service_name: billing-api-development
  context: development
  scan_variant: authenticated
  targets:
  - name: billing-api-development
    url: https://billing.dev.us-gov-west-1.aws-us-gov.cloud.gov
    include_paths:
    - ^https://billing\.dev\.us-gov-west-1\.aws-us-gov\.cloud\.gov/.*
    defectdojo:
      engagement_name: Recurring ZAP - Development
      test_title: billing.dev.us-gov-west-1.aws-us-gov.cloud.gov
    scan_type: api
    scan_profile: api
  auth_profile: development
  defectdojo:
    product_name: billing-api
- service_name: billing-api
  context: external
  scan_variant: authenticated
  targets:
  - name: billing-api-staging
    url: https://billing.fr-stage.cloud.gov
