---
# Imported targets — review and customize before use
# Source: ci/zap-config/targets.yml
# Targets: 26

defaults:
  enabled: true
  scan_variant: unauthenticated
  auth_mode: bearer
  report_to_defectdojo: true
  exclude_paths:
  - mozilla\.com
  - mozilla\.net
  - mozilla\.org
  - firefox\.com
  - getpocket\.com
  - cloudflare-dns\.com
  - digitalgov\.gov
  - elastic\.co
  - grafana\.com
  - jsdelivr\.net
  - secureauth\.gsa\.gov
  - .*logout.*
  - .*signout.*
  scan:
    minutes: 20
    max_depth: 5
    thread_count: 2
    passive_wait_minutes: 10
    fail_warn_level: Medium
    fail_error_level: High
  defectdojo:
    product_type_name: Web Application
    tags:
    - zap
    - concourse
    - automated
services:
- service_name: cloud-gov-public
  context: external
  scan_variant: unauthenticated
  auth_mode: unauthenticated
  targets:
  - name: cloud-gov-public
    url: https://cloud-gov.example.com
    include_paths:
    - ^https://cloud\.gov/.*
    scan:
      minutes: 5
      max_depth: 2
      thread_count: 1
    defectdojo:
      engagement_name: Recurring ZAP - cloud.gov Public
      test_title: cloud.gov (unauthenticated)
  defectdojo:
    product_name: cloud.gov Public
- service_name: billing-api-development
